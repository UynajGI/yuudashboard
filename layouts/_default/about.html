{{- define "main" }}
<div class="home-layout">
  {{ partial "sidebar.html" . }}
  <div class="home-feed">
    <article style="background:var(--entry);border:1px solid var(--border);border-radius:var(--dash-radius);padding:48px 44px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);animation:panel-rise .6s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent-purple),var(--accent-blue))"></div>
      <h1 style="font-size:2rem;font-weight:750;letter-spacing:-.035em;margin:0 0 12px;color:var(--primary)">{{ .Title }}</h1>
      {{- with .Description }}<p style="font-size:1.1rem;color:var(--secondary);margin:0 0 36px;line-height:1.6">{{ . }}</p>{{- end }}
      <div class="post-content md-content apple-content" style="color:var(--primary)">
        {{ .Content }}
      </div>
    </article>
  </div>
</div>
{{- end }}
{{ define "toc-container" }}{{ end }}
