{{- define "main" }}
<div class="home-layout">
  {{ partial "sidebar.html" . }}
  <div class="home-feed">
    <section class="apple-section-hero" style="width:100%;margin:0">
      <div class="apple-section-hero-inner">
        <div class="apple-section-kicker">关于</div>
        <h1 class="apple-section-title">{{ .Title }}</h1>
        {{- with .Description }}<p class="apple-section-description">{{ . }}</p>{{- end }}
      </div>
    </section>
    <section class="apple-section-body" style="width:100%;margin:16px 0 0">
      <article class="apple-content" style="background:var(--entry);border:1px solid var(--border);border-radius:var(--dash-radius);padding:24px 28px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06)">
        {{ .Content }}
      </article>
    </section>
  </div>
</div>
{{- end }}
{{ define "toc-container" }}{{ end }}
