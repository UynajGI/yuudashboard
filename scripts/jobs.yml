# 简报任务定义
# 加新简报只改这个文件，不需要动代码。
# 例如以后加早晚报 / 周报 / 月报，复制一份 job 配置改参数即可。
#
# 字段：
#   name                 任务名，CLI --job=NAME 用，也用于日志
#   schedule             仅文档作用（实际触发由 GA workflow 的 cron 控制）
#   section              Hugo content section，如 news
#   slug                 生成的文件名 slug
#   window               抓取时间窗口（24h / 7d / 30d）—— 过滤比此更早的条目
#   categories           按哪些 category 归类出正文分节
#   top_n_per_category   每个 category 精选条数上限（防失控天花板，非硬性目标；
#                        LLM 按实际价值选，可多可少）
#   workflow             处理阶段序列（见下方说明）
#   prompt_prefix        scripts/prompts/ 下本 job 的提示词前缀
#                        实际文件为 {prompt_prefix}-{stage}.md
#                        默认 daily，即 daily-select.md / daily-summarize.md / daily-tldr.md
#   output               输出路径模板，{date} 会替换成 YYYY-MM-DD（北京时间）
#   tags                 frontmatter 的 tags 字段
#   description          frontmatter 的 description 字段（{date} 会替换）
#   renderer             可选，选择哪个渲染器输出。缺省按 section 兜底：
#                        section=finance → finance，其余 → news。
#                        可选值：news / finance / sectors / focus / linkage / weekly。
#                        加新汇报模板：写 scripts/src/render-xxx.js + 在 index.js 注册 + 这里填 renderer: xxx
#   focus_target         仅 focus renderer 用：聚焦品种名（如 BTC / 黄金 / 上证综指）。
#                        手动触发时可在 GA inputs 改（见 fetch-finance.yml）。
#   agent                可选，LLM agent profile 名。在 workflow 后、render 前执行，
#                        agent 自主调用工具（查行情/查历史/查新闻）完成任务，结果挂到 ctx.agentResult。
#                        可选值：sectors-commentary。
#                        加新 agent：写 scripts/src/agents/xxx.js + 在 index.js AGENTS 注册 + 这里填 agent: xxx
#
# workflow 字段说明：
#   处理流水线，每个阶段是独立函数，context 在阶段间传递。
#   clean   纯脚本：抓取/解析/去重/时间窗过滤/分组（0 token）
#   select  LLM：识别同事件多源报道 → 合并；按重要度选 top N（只挑不写，输出极小）
#   summarize LLM：仅对精选后的条目生成中文摘要（最贵阶段，但只处理 N 条）
#   tldr    LLM：基于摘要生成 3-4 条总览要点
#   默认 [clean, select, summarize, tldr]。
#   想跳过某阶段（比如调试时只看 clean 结果），改这里即可，不动代码。

jobs:
  # ═══════════════════════════════════════
  # 时事 —— 按专栏拆分为三个独立报告
  # ═══════════════════════════════════════

  - name: daily-news-domestic
    schedule: "0 11 * * *"        # UTC 11:00 = 北京 19:00
    section: news
    slug: domestic
    window: 24h
    categories: [国内]
    top_n_per_category: 15
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-domestic.md
    tags: [时事, 国内]
    description: "时事专栏 · 国内 {date}"

  - name: daily-news-world
    schedule: "5 11 * * *"        # 比国内晚 5 分钟，避免并发
    section: news
    slug: world
    window: 24h
    categories: [国际]
    top_n_per_category: 15
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-world.md
    tags: [时事, 国际]
    description: "时事专栏 · 国际 {date}"

  - name: daily-news-tech
    schedule: "10 11 * * *"       # 比国内晚 10 分钟
    section: news
    slug: tech
    window: 24h
    categories: [科技]
    top_n_per_category: 15
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-tech.md
    tags: [时事, 科技]
    description: "时事专栏 · 科技 {date}"

  # ── 金融管线：新浪 API 拿市场数据 + 新闻，LLM 只做要闻精选/摘要/总览 ──
  - name: daily-market
    schedule: "0 11 * * *"       # UTC 11点 = 北京 19点（和晚报同时段）
    section: finance
    slug: market
    window: 24h
    categories: [要闻]            # 新闻只分一类；指数/商品/BTC 由 fetch 直接拿
    top_n_per_category: 8
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    output: content/finance/{date}-market.md
    tags: [金融]
    description: "市场概览：{date}"

  # ── 板块扫描：按 A股/港股/美股/亚太/商品/加密 分组看，agent 生成点评 ──
  # 与 finance（按品种平铺）互补。agent 自主查行情/历史/新闻，输出板块风格判断。
  - name: sector-scan
    schedule: "30 11 * * *"      # UTC 11:30 = 北京 19:30（比 finance 晚 30 分钟，避免并发）
    section: finance
    slug: sectors
    window: 24h
    categories: [要闻]
    top_n_per_category: 8
    workflow: [fetch, select, summarize]   # 不走 tldr，板块点评由 agent 生成
    agent: sectors-commentary              # agent profile：自主查工具生成点评
    renderer: sectors
    output: content/finance/{date}-sectors.md
    tags: [金融, 板块]
    description: "板块扫描：{date}"

  # ── 资产聚焦：单品种深看（B）──
  # agent 聚焦分析一个品种：价格+走势+驱动新闻+异动判断。
  # focus_target 指定品种名，手动触发时可改（如黄金、上证综指）。
  - name: asset-focus
    schedule: "45 11 * * *"      # UTC 11:45 = 北京 19:45（比 sectors 晚 15 分钟）
    section: finance
    slug: focus
    window: 24h
    categories: [要闻]
    top_n_per_category: 8
    workflow: [fetch, select, summarize]
    agent: focus-analysis
    renderer: focus
    focus_target: BTC            # 聚焦品种（可改：黄金 / 美元指数 / 上证综指 / 道琼斯 等）
    output: content/finance/{date}-focus-{target}.md
    tags: [金融, 资产聚焦]
    description: "资产聚焦：{target} {date}"

  # ── 联动观察：跨资产联动分析（D）──
  # agent 找高相关品种对 + 用新闻解释因果。
  - name: cross-linkage
    schedule: "0 12 * * *"       # UTC 12:00 = 北京 20:00
    section: finance
    slug: linkage
    window: 24h
    categories: [要闻]
    top_n_per_category: 8
    workflow: [fetch, select, summarize]
    agent: linkage-analysis
    renderer: linkage
    output: content/finance/{date}-linkage.md
    tags: [金融, 联动]
    description: "联动观察：{date}"

