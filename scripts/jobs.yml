# 简报任务定义
# 加新简报只改这个文件，不需要动代码。
# 例如以后加早晚报 / 周报 / 月报，复制一份 job 配置改参数即可。
#
# 字段：
#   name                 任务名，CLI --job=NAME 用，也用于日志
#   schedule             仅文档作用（实际触发由 GA workflow 的 cron 控制）
#   section              Hugo content section，如 news
#   slug                 生成的文件名 slug
#   window               抓取时间窗口（24h / 7d / 30d）—— 过滤比此更早的条目
#   categories           按哪些 category 归类出正文分节
#   top_n_per_category   每个 category 精选条数上限（防失控天花板，非硬性目标；
#                        LLM 按实际价值选，可多可少）
#   workflow             处理阶段序列（见下方说明）
#   prompt_prefix        scripts/prompts/ 下本 job 的提示词前缀
#                        实际文件为 {prompt_prefix}-{stage}.md
#                        默认 daily，即 daily-select.md / daily-summarize.md / daily-tldr.md
#   output               输出路径模板，占位符：
#                        {date}=YYYY-MM-DD，{stamp}=HHMMSS（同日重跑防撞），{slug}=job.slug
#                        例：content/news/{date}-{stamp}-{slug}.md → /news/2026-07-04-143025-domestic.html
#   tags                 frontmatter 的 tags 字段
#   description          frontmatter 的 description 字段（{date} 会替换）
#   renderer             可选，选择哪个渲染器输出。缺省按 section 兜底：
#                        section=finance → finance，其余 → news。
#                        可选值：news / finance / sectors / focus / linkage / weekly。
#                        加新汇报模板：写 scripts/src/render-xxx.js + 在 index.js 注册 + 这里填 renderer: xxx
#   focus_target         仅 focus renderer 用：聚焦品种名（如 BTC / 黄金 / 上证综指）。
#                        手动触发时可在 GA inputs 改（见 fetch-finance.yml）。
#   agent                可选，LLM agent profile 名。在 workflow 后、render 前执行，
#                        agent 自主调用工具（查行情/查历史/查新闻）完成任务，结果挂到 ctx.agentResult。
#                        可选值：sectors-commentary。
#                        加新 agent：写 scripts/src/agents/xxx.js + 在 index.js AGENTS 注册 + 这里填 agent: xxx
#
# workflow 字段说明：
#   处理流水线，每个阶段是独立函数，context 在阶段间传递。
#   clean   纯脚本：抓取/解析/去重/时间窗过滤/分组（0 token）
#   select  LLM：识别同事件多源报道 → 合并；按重要度选 top N（只挑不写，输出极小）
#   summarize LLM：仅对精选后的条目生成中文摘要（最贵阶段，但只处理 N 条）
#   tldr    LLM：基于摘要生成 3-4 条总览要点
#   默认 [clean, select, summarize, tldr]。
#   想跳过某阶段（比如调试时只看 clean 结果），改这里即可，不动代码。

jobs:
  # ═══════════════════════════════════════
  # 时事 —— 按专栏拆分为三个独立报告
  # ═══════════════════════════════════════

  - name: daily-news-domestic
    schedule: "0 11 * * *"
    section: news
    slug: domestic
    window: 24h
    categories: [国内]
    subs: [时政, 经济, 社会, 军事, 外交, 教育, 其他]
    top_n_per_category: 30
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-{stamp}-domestic.md
    tags: [时事, 国内]
    description: "时事专栏 · 国内 {date}"

  - name: daily-news-world
    schedule: "5 11 * * *"
    section: news
    slug: world
    window: 24h
    categories: [国际]
    subs: [地缘, 经贸, 社会, 军事, 科技, 其他]
    top_n_per_category: 30
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-{stamp}-world.md
    tags: [时事, 国际]
    description: "时事专栏 · 国际 {date}"

  - name: daily-news-tech
    schedule: "10 11 * * *"
    section: news
    slug: tech
    window: 24h
    categories: [科技]
    subs: [AI, 半导体硬件, 互联网, 工具产品, 科研学术, 其他]
    top_n_per_category: 30
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-{stamp}-tech.md
    tags: [时事, 科技]
    description: "时事专栏 · 科技 {date}"

  - name: daily-news-engineering
    schedule: "15 11 * * *"
    section: news
    slug: engineering
    window: 24h
    categories: [工程]
    subs: [平台动态, 语言框架, 架构设计, AI工程, 安全, 开源项目, 其他]
    top_n_per_category: 30
    workflow: [clean, select, summarize, tldr]
    prompt_prefix: daily
    output: content/news/{date}-{stamp}-engineering.md
    tags: [时事, 工程]
    description: "时事专栏 · 工程 {date}"

  - name: daily-news-digest
    schedule: "20 11 * * *"
    section: news
    slug: digest
    window: 24h
    categories: []
    workflow: [digest]
    renderer: digest
    output: content/news/{date}-{stamp}-digest.md
    tags: [时事, 今日要闻]
    description: "今日要闻汇总：{date}"
    columns:
      - { name: 国内, slug: domestic }
      - { name: 国际, slug: world }
      - { name: 科技, slug: tech }
      - { name: 工程, slug: engineering }

  # ═══════════════════════════════════════
  # 金融 —— 按市场拆 5 专栏 + 1 汇总
  # ═══════════════════════════════════════

  - name: daily-finance-ashare
    schedule: "0 11 * * *"
    section: finance
    slug: ashare
    window: 24h
    market: ashare
    search: ["A股 今日 沪深 行情", "沪指 创业板 今日", "北向资金 央行 政策 今日"]
    categories: [A股]
    subs: [大盘, 行业板块, 资金流向, 个股, 政策, 其他]
    news_filter: [A股, 沪深, 上证, 深证, 创业板, 科创, 北向, 降准, LPR, 央行, 证监会, 交易所, 上市公司, 股市, 减持, 增持, 回购, 定增, 财报, 营收, 业绩, 涨停, 跌停, 牛市, 熊市]
    top_n_per_category: 30
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    renderer: finance-column
    output: content/finance/{date}-{stamp}-ashare.md
    tags: [金融, A股]
    description: "金融专栏 · A股 {date}"

  - name: daily-finance-hk
    schedule: "5 11 * * *"
    section: finance
    slug: hk
    window: 24h
    market: hk
    search: ["港股 恒生指数 今日", "恒生科技 南向资金 今日", "腾讯 阿里 港股 今日"]
    categories: [港股]
    subs: [大盘, 科技, 金融, 地产, 其他]
    news_filter: [港股, 恒生, 南向, 香港, 港交所, 恒生科技, 腾讯, 阿里, 美团, 小米, 蔚来, 理想, 港股通, 中概股]
    top_n_per_category: 30
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    renderer: finance-column
    output: content/finance/{date}-{stamp}-hk.md
    tags: [金融, 港股]
    description: "金融专栏 · 港股 {date}"

  - name: daily-finance-asia
    schedule: "8 11 * * *"
    section: finance
    slug: asia
    window: 24h
    market: asia
    search: ["亚太股市 日经 KOSPI 今日", "日本股市 韩国 今日", "台积电 三星 今日"]
    categories: [亚盘]
    subs: [日本, 韩国, 东盟, 其他]
    news_filter: [日经, 日本, 韩国, KOSPI, 东盟, 东南亚, 亚太, 三星, 台积电, 香港, 新加坡, 印度, 澳洲, 亚太股市]
    top_n_per_category: 30
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    renderer: finance-column
    output: content/finance/{date}-{stamp}-asia.md
    tags: [金融, 亚盘]
    description: "金融专栏 · 亚盘 {date}"

  - name: daily-finance-us
    schedule: "10 11 * * *"
    section: finance
    slug: us
    window: 24h
    market: us
    search: ["美股 纳斯达克 道琼斯 今日", "美联储 鲍威尔 CPI 今日", "英伟达 特斯拉 苹果 今日"]
    categories: [美股]
    subs: [大盘, 科技, 宏观, 国债, 其他]
    news_filter: [美股, 纳斯达克, 道琼斯, 标普, 美联储, 非农, 美债, CPI, 美国经济, 英伟达, 苹果, 特斯拉, 微软, 谷歌, 美国股市, 华尔街, PPI, 鲍威尔]
    top_n_per_category: 30
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    renderer: finance-column
    output: content/finance/{date}-{stamp}-us.md
    tags: [金融, 美股]
    description: "金融专栏 · 美股 {date}"

  - name: daily-finance-commodity
    schedule: "15 11 * * *"
    section: finance
    slug: commodity
    window: 24h
    market: commodity
    search: ["黄金 原油 大宗商品 今日", "金价 美元 OPEC 今日", "铜 铁 天然气 今日"]
    categories: [商品]
    subs: [贵金属, 能源, 外汇, 其他]
    news_filter: [黄金, 金价, 原油, 油价, 美元, OPEC, 大宗, 美债, 白银, 铜, 铁矿石, 天然气, 农产品, 期货, 大宗商品, 贵金属, 矿业]
    top_n_per_category: 30
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    renderer: finance-column
    output: content/finance/{date}-{stamp}-commodity.md
    tags: [金融, 商品]
    description: "金融专栏 · 商品 {date}"

  - name: daily-finance-crypto
    schedule: "20 11 * * *"
    section: finance
    slug: crypto
    window: 24h
    market: crypto
    search: ["比特币 BTC 以太坊 ETH 今日", "加密货币 币安 区块链 今日", "狗狗币 XRP 稳定币 今日"]
    categories: [加密]
    subs: [BTC, ETH, 监管, 链上, 其他]
    news_filter: [BTC, 比特币, 以太坊, ETH, 加密, 区块链, 稳定币, 币安, Coinbase, 狗狗币, 瑞波, XRP, DeFi, NFT, 挖矿, 数字货币, 代币]
    top_n_per_category: 30
    workflow: [fetch, select, summarize, tldr]
    prompt_prefix: finance
    renderer: finance-column
    output: content/finance/{date}-{stamp}-crypto.md
    tags: [金融, 加密]
    description: "金融专栏 · 加密 {date}"

  - name: daily-finance-digest
    schedule: "25 11 * * *"
    section: finance
    slug: digest
    window: 24h
    categories: []
    workflow: [finance-digest]
    renderer: finance-digest
    output: content/finance/{date}-{stamp}-digest.md
    tags: [金融, 汇总]
    description: "金融市场汇总：{date}"
    columns:
      - { name: A股, slug: ashare }
      - { name: 港股, slug: hk }
      - { name: 亚盘, slug: asia }
      - { name: 美股, slug: us }
      - { name: 商品, slug: commodity }
      - { name: 加密, slug: crypto }

