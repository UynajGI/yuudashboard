name: Fetch Finance

on:
  schedule:
    # UTC 11:15 = 北京时间 19:15（晚报时段，比 fetch-news 晚 15 分钟避免并发 push 冲突）
    - cron: '15 11 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '要跑的金融类任务（jobs.yml 里定义的 name：finance/sectors/focus/linkage）'
        required: false
        default: 'finance'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Run finance pipeline
        working-directory: scripts
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node src/index.js --job=${{ inputs.job || 'finance' }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ data/seen.json data/market-history.json data/recent-events.json
          if git diff --cached --quiet; then
            echo "无改动，跳过提交"
          else
            git commit -m "chore(finance): 自动市场概览 $(date -u +%Y-%m-%d)"
            # 若另一个 workflow 刚 push 过，先 rebase 再 push（避免冲突）
            git pull --rebase origin main || true
            git push
          fi
