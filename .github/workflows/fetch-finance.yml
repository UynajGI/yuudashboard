name: Generate Finance Reports

on:
  schedule:
    # UTC 11:15 = 北京时间 19:15
    - cron: '15 11 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '手动跑单个 job（留空=全跑：daily-market/sector-scan/asset-focus/cross-linkage）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Run reports
        working-directory: scripts
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          if [ -n "${{ inputs.job }}" ]; then
            # 手动触发单个 job
            echo "### 手动触发：${{ inputs.job }}"
            node v2/index.js --job="${{ inputs.job }}"
          else
            # 定时/手动全跑：4 个报告依次生成，一次 commit 避免 push 冲突
            JOBS="daily-market sector-scan asset-focus cross-linkage"
            for job in $JOBS; do
              echo ""
              echo "========================================"
              echo "### $job"
              echo "========================================"
              node v2/index.js --job="$job" || echo "⚠ $job 失败，继续下一个"
            done
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ data/seen.json data/recent-events.json
          if git diff --cached --quiet; then
            echo "无改动，跳过提交"
          else
            git commit -m "chore(finance): 自动报告 $(date -u +%Y-%m-%d)"
            # 拉取远程最新 + rebase（如冲突则中止，不阻塞）
            git fetch origin main 2>/dev/null
            git rebase origin/main 2>/dev/null || { git rebase --abort 2>/dev/null; echo "⚠ rebase 冲突，直接 push 尝试"; }
            git push 2>/dev/null || echo "⚠ push 失败（下次运行重试）"
          fi
