name: Fetch News

on:
  schedule:
    # UTC 11点 = 北京时间 19点（晚报）
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '手动跑单个时事 job（留空=全跑国内/国际/科技）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Run reports
        working-directory: scripts
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "${{ inputs.job }}" ]; then
            echo "### 手动触发：${{ inputs.job }}"
            node v2/index.js --job="${{ inputs.job }}"
          else
            for job in daily-news-domestic daily-news-world daily-news-tech daily-news-engineering; do
              echo "### $job"
              node v2/index.js --job="$job" || echo "⚠ $job 失败"
            done
            echo "### daily-news-digest"
            node v2/index.js --job=daily-news-digest || echo "⚠ digest 失败"
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ data/seen.json data/recent-events.json
          if git diff --cached --quiet; then
            echo "无改动，跳过提交"
          else
            git commit -m "chore(news): 自动简报 $(date -u +%Y-%m-%d)"
            # push 失败 → fetch + rebase，state 文件冲突自动用远程版本
            if ! git push origin main 2>/dev/null; then
              echo "push 冲突，fetch + rebase..."
              git fetch origin main
              if ! git rebase origin/main 2>/dev/null; then
                # state 文件冲突 → 用远程版本（content/ 必须保留本地）
                git checkout --theirs data/seen.json data/recent-events.json 2>/dev/null
                git add data/seen.json data/recent-events.json
                git rebase --continue 2>/dev/null || { git rebase --abort 2>/dev/null; }
              fi
              git push origin main 2>/dev/null || echo "push 仍失败，下次运行重试"
            fi
          fi
