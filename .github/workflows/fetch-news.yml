name: Fetch News

on:
  schedule:
    # UTC 11点 = 北京时间 19点（晚报）
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: '要跑的简报任务名（jobs.yml 里定义的 name）'
        required: false
        default: 'daily-news'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Run fetch pipeline
        working-directory: scripts
        env:
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node v2/index.js --job=${{ inputs.job || 'daily-news' }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ data/seen.json data/recent-events.json
          if git diff --cached --quiet; then
            echo "无改动，跳过提交"
          else
            git commit -m "chore(news): 自动简报 $(date -u +%Y-%m-%d)"
            git push origin main 2>/dev/null && exit 0
            echo "push 冲突，尝试 pull + rebase..."
            git fetch origin main
            git rebase origin/main 2>/dev/null || { git rebase --abort 2>/dev/null; echo "rebase 跳过"; }
            git push origin main 2>/dev/null || echo "push 仍失败，下次运行重试"
          fi
